name: Release & Publish

on:
  pull_request:
    types:
      - closed
    branches:
      - master

jobs:
  release_publish:
    if: github.event.pull_request.merged == true && github.head_ref == 'develop'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Remove SNAPSHOT from POM
        id: bump_version
        run: |
          mvn versions:set -DremoveSnapshot=true -DgenerateBackupPoms=false
          NEW_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and Push to Master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: release version ${{ steps.bump_version.outputs.version }}"
          git push origin master

      - name: Package Application
        # Tests are skipped because they already passed in the PR Validation workflow
        run: mvn clean package -DskipTests

      - name: Stage release jar
        shell: bash
        run: |
          mkdir -p dist
          VERSION='${{ steps.bump_version.outputs.version }}'
          cp target/*.jar "dist/BarKeeper-${VERSION}.jar"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          tag_name: v${{ steps.bump_version.outputs.version }}
          name: Release v${{ steps.bump_version.outputs.version }}
          files: dist/*.jar
          generate_release_notes: true
